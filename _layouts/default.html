<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title }}</title>
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico" />
    <style>
      :root {
        --paper: #f7f3ea;
        --ink: #000000;
        --accent: #e06666;
        --nav-bg: #fffee8;
        --box-bg: #ffffff;
        --box-border: #0800ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        font-family: "Times New Roman", serif;
        background: url("/assets/backdrop.jpg") repeat center top;
        min-height: 100vh;
      }

      .page {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: 0 24px;
      }

      .page-inner {
        display: grid;
        grid-template-columns: minmax(220px, 1fr) minmax(420px, 2fr);
        gap: 0;
        max-width: 960px;
        width: 100%;
      }

      .left {
        padding: 24px 16px 48px;
        display: flex;
        justify-content: flex-end;
      }

      .nav-panel {
        width: min(220px, 100%);
        background: var(--nav-bg);
        border: 1px solid var(--box-border);
        padding: 12px 10px;
        font-size: 14px;
      }

      .nav-panel h2 {
        margin: 6px 0 8px;
        font-size: 14px;
        text-transform: lowercase;
        text-align: center;
        background: #f2ff00;
        border: 1px solid var(--box-border);
        padding: 2px 4px;
      }

      .nav-panel a {
        color: #1a0dab;
        text-decoration: underline;
        display: block;
        padding: 2px 0;
      }

      .main {
        padding: 24px 12px 48px;
      }

      .content-box {
        background: var(--box-bg);
        border: 2px solid var(--box-border);
        padding: 0;
      }

      .content-header {
        background: #00ff1e;
        border-bottom: 2px solid var(--box-border);
        padding: 6px 10px;
        font-size: 14px;
      }

      .content-inner {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 0;
      }

      .content-left {
        padding: 12px;
        border-right: 2px solid var(--box-border);
      }

      .content-right {
        padding: 12px;
      }

      .notice {
        background: #e9f7ff;
        border: 1px solid var(--box-border);
        padding: 8px;
        font-size: 13px;
        margin-bottom: 10px;
      }

      @media (max-width: 900px) {
        .page-inner {
          grid-template-columns: 1fr;
        }

        .left {
          justify-content: center;
        }

        .main {
          padding: 12px 16px 32px;
        }

        .content-inner {
          grid-template-columns: 1fr;
        }

        .content-left {
          border-right: 0;
          border-bottom: 2px solid var(--box-border);
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="page-inner">
        <aside class="left">
          <nav class="nav-panel">
            {% for section in site.data.navigation.sections %}
              <h2>{{ section.heading }}</h2>
              {% for link in section.links %}
                <a href="{{ link.url | relative_url }}">{{ link.title }}</a>
              {% endfor %}
            {% endfor %}
          </nav>
        </aside>
        <main class="main">
          {{ content }}
        </main>
      </div>
    </div>
  </body>
</html>
