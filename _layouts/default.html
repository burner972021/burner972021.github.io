<!DOCTYPE html>
    <html class="bgimage">
        <head>
            <style>     
                .bgimage {
                    background-image: url('{{ site.baseurl }}./assets/images/backdrop.jpg');
                    width: fit-content;
                }
                
                #content {
                    font-size: 200px;
                    font-family: Arial, Helvetica, sans-serif;
                    font-style: italic;
                    font-weight: bold;
                    color: grey;
                    text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
                }
            </style>
            <title>
                {{ page.title }}
            </title>
        </head>
        <body id="content">
            {{ content }}
        </body>
    </html>
